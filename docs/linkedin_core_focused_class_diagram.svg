Adjust="spacing" textLength="61.2866" x="12" y="1077.5194">- filtering</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="107.1484" x="12" y="1092.8299">- capture writing</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="99.3154" x="12" y="1108.1405">- fixture export</text></g><g class="entity" data-qualified-name="GMN102" data-source-line="391" id="ent0103"><path d="M1525.44,975.7383 L1525.44,1123.5332 L1828.9044,1123.5332 L1828.9044,985.7383 L1818.9044,975.7383 L1525.44,975.7383" fill="#FFFCE8" style="stroke:#C8B97E;stroke-width:0.5;"/><path d="M1818.9044,975.7383 L1818.9044,985.7383 L1828.9044,985.7383 L1818.9044,975.7383" fill="#FFFCE8" style="stroke:#C8B97E;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="282.4644" x="1531.44" y="993.3066">Primary refactor hotspot on the harvest side.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="114.772" x="1531.44" y="1008.6172">It currently mixes:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="106.5391" x="1531.44" y="1023.9277">- query planning</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="163.5728" x="1531.44" y="1039.2383">- schedule/window policy</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="107.5674" x="1531.44" y="1054.5488">- pacing/backoff</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="125.1504" x="1531.44" y="1069.8594">- request execution</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="61.2866" x="1531.44" y="1085.1699">- filtering</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="167.3877" x="1531.44" y="1100.4805">- persistence coordination</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="59.522" x="1531.44" y="1115.791">- logging</text></g><g class="entity" data-qualified-name="GMN105" data-source-line="403" id="ent0106"><path d="M5247.22,1021.6783 L5247.22,1077.6099 L5621.1179,1077.6099 L5621.1179,1031.6783 L5611.1179,1021.6783 L5247.22,1021.6783" fill="#FFFCE8" style="stroke:#C8B97E;stroke-width:0.5;"/><path d="M5611.1179,1021.6783 L5611.1179,1031.6783 L5621.1179,1031.6783 L5611.1179,1021.6783" fill="#FFFCE8" style="stroke:#C8B97E;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="242.6772" x="5253.22" y="1039.2466">Operational surface, not domain logic.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="311.5303" x="5253.22" y="1054.5572">The script entrypoints are shown explicitly so the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="352.8979" x="5253.22" y="1069.8677">runtime helper model is not confused with the OO core.</text></g><!--reverse link JobSourceAdapter to LinkedInJsonFileAdapter--><g class="link" data-entity-1="ent0008" data-entity-2="ent0011" data-link-type="extension" data-source-line="322" id="lnk47"><path codeLine="322" d="M1012.9624,188.4623 C1058.0624,259.1423 1157.87,415.5483 1211.52,499.6183" fill="none" id="JobSourceAdapter-backto-LinkedInJsonFileAdapter" style="stroke:#181818;stroke-width:1;"/><polygon fill="none" points="1003.28,173.2883,1007.9043,191.6898,1018.0204,185.2349,1003.28,173.2883" style="stroke:#181818;stroke-width:1;"/></g><!--reverse link JobSourceAdapter to LinkedInScrapeAdapter--><g class="link" data-entity-1="ent0008" data-entity-2="ent0012" data-link-type="extension" data-source-line="323" id="lnk48"><path codeLine="323" d="M946.882,187.373 C908.272,235.893 843.04,317