12.8711" fill="#FFFCE8" style="stroke:#C8B97E;stroke-width:0.5;"/><path d="M1312.5811,2712.8711 L1312.5811,2722.8711 L1322.5811,2722.8711 L1312.5811,2712.8711" fill="#FFFCE8" style="stroke:#C8B97E;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="426.9561" x="880.625" y="2730.4395">Runtime commands are not part of the ingest/harvest domain flow.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="350.9556" x="880.625" y="2745.75">They delegate into `HarvestCronScripts`, which installs</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="363.2256" x="880.625" y="2761.0605">cron blocks, launches guarded harvest runs, and exposes</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="195.1904" x="880.625" y="2776.3711">operational status/log helpers.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="145.6978" x="880.625" y="2791.6816">The runtime surface is:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="199.8369" x="880.625" y="2806.9922">- `src/runtime_entrypoints.py`</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="229.1948" x="880.625" y="2822.3027">- `src/persistence_runtime_ops.py`</text><ellipse cx="843.625" cy="2771.458" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="843.625" cy="2771.458" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="802.9272" x2="771.7695" y1="180.1094" y2="180.1094"/><line style="stroke:#181818;stroke-width:1;" x1="771.7695" x2="771.7695" y1="180.1094" y2="202.1094"/><polygon fill="#181818" points="767.7695,192.1094,771.7695,202.1094,775.7695,192.1094,771.7695,196.1094" st