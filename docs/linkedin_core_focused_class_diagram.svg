184.5866">Operational surface, not domain logic.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="421.04" x="5440.15" y="1199.8972">Runtime command dispatch lives in `src/runtime_entrypoints.py`.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="351.5205" x="5440.15" y="1215.2077">This class owns cron installation, guarded harvest runs,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="222.7329" x="5440.15" y="1230.5183">and operational status/log helpers.</text></g><!--reverse link JobSourceAdapter to LinkedInJsonFileAdapter--><g class="link" data-entity-1="ent0009" data-entity-2="ent0013" data-link-type="extension" data-source-line="322" id="lnk53"><path codeLine="322" d="M1033.0071,231.9552 C1077.2971,312.8152 1186.87,512.8583 1239.85,609.5883" fill="none" id="JobSourceAdapter-backto-LinkedInJsonFileAdapter" style="stroke:#181818;stroke-width:1;"/><polygon fill="none" points="1024.36,216.1683,1027.7448,234.8376,1038.2694,229.0729,1024.36,216.1683" style="stroke:#181818;stroke-width:1;"/></g><!--reverse link JobSourceAdapter to LinkedInScrapeAdapter--><g class="link" data-entity-1="ent0009" data-entity-2="ent0014" data-link-type="extension" data-source-line="323" id="lnk54"><path codeLine="323" d="M975.5771,231.0316 C935.2071,290.1316 855.75,406.4583 784.64,510.5683" fill="none" id="JobSourceAdapter-backto-LinkedInScrapeAdapter" style="stroke:#181818;stroke-width:1;"/><polygon fill="none" points="985.73,216.1683,970.6227,227.6474,980.5316,234.4159,985.73,216.1683" style="stroke:#181818;stroke-width:1;"/></g><!--link LinkedInJsonFileAdapter to JobRecord--><g class="link" data-entity-1="ent0013" data-entity-2="ent0005" data-link-type="dependency" data-source-line="325" id="lnk55"><path codeLine="325" d="M1517.9,700.9783 C1793.31,750.5583 2211.97,840.1583 2334.17,944.2483 C2361.18,967.2583 2379.424,992.5181 2395.